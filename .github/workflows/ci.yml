name: ci

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run core pytest
        run: |
          python -m pytest tests/test_ai_semantic_analyzer.py tests/test_ai_event_intel.py tests/test_ai_event_intel_sina.py tests/test_config_center.py -q

      - name: Run news-chain pytest
        run: |
          python -m pytest tests/test_realtime_news_monitor.py tests/test_canary_source_health.py tests/test_verify_canary_source_health.py -q

      - name: Run stage5/stage6 contract pytest
        run: |
          python -m pytest tests/test_member_b_stage5_scorecard_contract.py tests/test_outcome_attribution_engine.py tests/test_opportunity_score.py -q

      - name: Run PR109 tier1 mapping tests
        run: |
          python -m pytest tests/test_conduction_mapper_dynamic.py -q

      - name: Run PR109 regression eval smoke
        run: |
          python -m pytest tests/test_ai_mapping_regression_eval_smoke.py -q

      - name: Run PR109 config contract tests
        run: |
          python -m pytest tests/test_tier1_mapping_rules_contract.py tests/test_ai_mapping_regression_policy_contract.py tests/test_tier1_guardrails_config_runtime.py -q

      - name: Run PR111 lifecycle-fatigue contract tests
        run: |
          python -m pytest tests/test_pr111_lifecycle_fatigue_contract.py -q

      - name: Run PR110 causal contract tests
        run: |
          python -m pytest tests/test_causal_contract_schema.py tests/test_causal_contract_fields.py tests/test_causal_contract_consumer_boundary.py tests/test_causal_contract_config_runtime.py -q

      - name: Run healthcheck
        run: |
          python scripts/system_healthcheck.py --mode dev

      - name: Run no-pytest verification
        run: |
          python scripts/verify_execution_no_pytest.py

      - name: Run regression quality gates
        run: |
          python scripts/verify_sector_coverage.py --min-coverage 0.90
          python scripts/verify_dedupe_accuracy.py --min-accuracy 0.95
          python scripts/verify_direction_consistency.py --min-rate 0.85
          python scripts/verify_mapping_quality.py --min-family-coverage 1.0 --min-precision 0.9

      - name: Run canary source health gate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python scripts/verify_canary_source_health.py --refresh
