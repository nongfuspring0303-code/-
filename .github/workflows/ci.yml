name: ci

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run core pytest
        run: |
          python -m pytest tests/test_ai_semantic_analyzer.py tests/test_ai_event_intel.py tests/test_ai_event_intel_sina.py tests/test_config_center.py -q

      - name: pipeline-order-contract
        run: |
          python -m pytest tests/test_pipeline_order.py tests/test_semantic_prepass_contract.py -q

      - name: Run PR123 semantic parser hardening tests
        run: |
          python -m pytest tests/test_ai_semantic_json_parser.py tests/test_ai_semantic_analyzer.py -q

      - name: Run news-chain pytest
        run: |
          python -m pytest tests/test_realtime_news_monitor.py tests/test_canary_source_health.py tests/test_verify_canary_source_health.py -q

      - name: Run stage5/stage6 contract pytest
        run: |
          python -m pytest tests/test_member_b_stage5_scorecard_contract.py tests/test_outcome_attribution_engine.py tests/test_opportunity_score.py -q

      - name: Run PR122 semantic-chain audit pytest
        run: |
          python -m pytest tests/test_live_chain_audit.py tests/test_opportunity_score.py -q

      - name: Run PR109 tier1 mapping tests
        run: |
          python -m pytest tests/test_conduction_mapper_dynamic.py -q

      - name: Run PR109 regression eval smoke
        run: |
          python -m pytest tests/test_ai_mapping_regression_eval_smoke.py -q

      - name: Run PR109 config contract tests
        run: |
          python -m pytest tests/test_tier1_mapping_rules_contract.py tests/test_ai_mapping_regression_policy_contract.py tests/test_tier1_guardrails_config_runtime.py -q

      - name: Run PR111 lifecycle-fatigue contract tests
        run: |
          python -m pytest tests/test_pr111_lifecycle_fatigue_contract.py -q

      - name: Run PR112 execution-suggestion contract tests
        run: |
          python -m pytest tests/test_execution_suggestion_schema.py tests/test_execution_suggestion_policy_contract.py tests/test_execution_suggestion_consumer_boundary.py -q

      - name: Run PR112 execution-suggestion full-workflow failure-path tests
        run: |
          python -m pytest tests/test_full_workflow.py::test_full_workflow_missing_score_does_not_silent_fallback tests/test_full_workflow.py::test_full_workflow_missing_fatigue_score_does_not_silent_fallback tests/test_full_workflow.py::test_full_workflow_builder_failed_is_not_swallowed -q

      - name: Run PR110 causal contract tests
        run: |
          python -m pytest tests/test_causal_contract_schema.py tests/test_causal_contract_fields.py tests/test_causal_contract_consumer_boundary.py tests/test_causal_contract_config_runtime.py -q

      - name: Run PR113 path-quality-eval contract tests
        run: |
          python -m pytest tests/test_path_quality_eval_schema.py tests/test_path_quality_eval_policy_contract.py tests/test_path_quality_eval_consumer_boundary.py -q

      - name: Run PR113 path-quality-eval full-workflow tests
        run: |
          python -m pytest tests/test_full_workflow.py::test_full_workflow_path_quality_eval_failed_is_not_swallowed tests/test_full_workflow.py::test_full_workflow_path_quality_eval_missing_upstream_does_not_inject_empty tests/test_full_workflow.py::test_full_workflow_path_quality_eval_success_path -q

      - name: Run PR115 project trace API tests
        run: |
          python -m pytest tests/test_project_trace_api.py -q

      - name: Run PR115 frontend contract tests
        run: |
          python -m pytest tests/test_project_trace_frontend_contract.py -q

      - name: Run PR2 project gap monitor tests
        run: |
          python -m pytest tests/test_project_gap_monitor.py -q

      - name: Run final-freeze market provenance tests
        run: |
          python -m pytest tests/test_stage5_log_outputs.py -q
          python -m pytest tests/test_residual_evidence_logging_gaps.py -q

      - name: Run PR3 project health static contract tests
        run: |
          python -m pytest tests/test_project_health_static_contract.py tests/test_local_daily_project_monitor_static.py tests/test_project_health_security_rendering.py -q

      - name: Run PR3 remediation runner
        run: python3 tests/runner.py

      - name: Run healthcheck
        run: |
          python scripts/system_healthcheck.py --mode dev

      - name: Run no-pytest verification
        run: |
          python scripts/verify_execution_no_pytest.py

      - name: Run regression quality gates
        run: |
          python scripts/verify_sector_coverage.py --min-coverage 0.90
          python scripts/verify_dedupe_accuracy.py --min-accuracy 0.95
          python scripts/verify_direction_consistency.py --min-rate 0.85
          python scripts/verify_mapping_quality.py --min-family-coverage 1.0 --min-precision 0.9

      # ── Stage 8-A contract matrix CI gates ──
      - name: pipeline-order-contract
        run: |
          if [ -f tests/test_pipeline_order.py ] && [ -f tests/test_semantic_prepass_contract.py ]; then
            python -m pytest tests/test_pipeline_order.py tests/test_semantic_prepass_contract.py -q
          else
            echo "[SKIP] pipeline-order / prepass-contract tests not yet added (Stage8A-Impl-1 pending)"
          fi

      - name: candidate-envelope-contract
        run: |
          if [ -f tests/test_candidate_envelope.py ]; then
            python -m pytest tests/test_candidate_envelope.py -q
          else
            echo "[SKIP] tests/test_candidate_envelope.py not yet added (Stage8A-Impl-2 pending)"
          fi

      - name: resolver-merge-contract
        run: |
          if [ -f tests/test_entity_resolver.py ] && [ -f tests/test_candidate_merge.py ]; then
            python -m pytest tests/test_entity_resolver.py tests/test_candidate_merge.py -q
          else
            echo "[SKIP] resolver/merge tests not yet added (Stage8A-Impl-3 pending)"
          fi

      - name: semantic-full-peer-contract
        run: |
          if [ -f tests/test_semantic_full_peer_expansion.py ]; then
            python -m pytest tests/test_semantic_full_peer_expansion.py -q
          else
            echo "[SKIP] semantic-full-peer tests not yet added (Stage8A-Impl-4 pending)"
          fi

      - name: market-validation-contract
        run: |
          if [ -f tests/test_market_validation.py ]; then
            python -m pytest tests/test_market_validation.py -q
          else
            echo "[SKIP] market-validation tests not yet added (Stage8A-Impl-5 pending)"
          fi

      - name: routing-authority-contract
        run: |
          if [ -f tests/test_path_adjudicator.py ] && [ -f tests/test_semantic_override.py ] && [ -f tests/test_semantic_verdict.py ]; then
            python -m pytest tests/test_path_adjudicator.py tests/test_semantic_override.py tests/test_semantic_verdict.py -q
          else
            echo "[SKIP] routing-authority tests not yet added (Stage8A-Impl-6 pending)"
          fi

      - name: output-adapter-contract
        run: |
          if [ -f tests/test_output_adapter.py ] && [ -f tests/test_gate_diagnostics.py ]; then
            python -m pytest tests/test_output_adapter.py tests/test_gate_diagnostics.py -q
          else
            echo "[SKIP] output-adapter tests not yet added (Stage8A-Impl-7 pending)"
          fi

      - name: advanced-gates-contract
        run: |
          if [ -f tests/test_lifecycle_fatigue_gate.py ] && [ -f tests/test_cross_news_conflict.py ] && [ -f tests/test_crowding_discount.py ]; then
            python -m pytest tests/test_lifecycle_fatigue_gate.py tests/test_cross_news_conflict.py tests/test_crowding_discount.py -q
          else
            echo "[SKIP] advanced-gates tests not yet added (Stage8A-Impl-8 pending)"
          fi

      - name: threshold-config-contract
        run: |
          python -m pytest tests/test_threshold_config.py -q

      - name: compatibility-exit-contract
        run: |
          if [ -f tests/test_compatibility_exit.py ]; then
            python -m pytest tests/test_compatibility_exit.py -q
          else
            echo "[SKIP] compatibility-exit tests not yet added"
          fi

      - name: ci-workflow-step-contract
        run: |
          python -m pytest tests/test_ci_workflow_steps.py -q

      - name: Run canary source health gate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python scripts/verify_canary_source_health.py --refresh
