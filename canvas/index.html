<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDT指挥中心 - 实时事件驱动交易</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- 左栏：新闻雷达 -->
    <div class="panel left-panel" id="newsPanel">
      <div class="panel-header">
        <div class="panel-title">
          <span class="icon">📰</span>
          新闻雷达
          <span class="badge badge-live">LIVE</span>
        </div>
        <div class="panel-status">
          <span class="status-dot"></span>
          <span id="connectionStatus">连接中...</span>
        </div>
      </div>
      <div class="news-list" id="newsList">
        <!-- 新闻卡片由 JS 动态渲染 -->
      </div>
    </div>

    <!-- 中栏：板块热力图 -->
    <div class="panel center-panel" id="sectorPanel">
      <div class="panel-header">
        <div class="panel-title">
          <span class="icon">🔥</span>
          板块热力图
        </div>
        <div class="panel-filter">
          <select id="sectorFilter">
            <option value="all">全部板块</option>
            <option value="LONG">只看多头</option>
            <option value="SHORT">只看空头</option>
          </select>
        </div>
      </div>
      <div class="sector-list" id="sectorList">
        <!-- 板块卡片由 JS 动态渲染 -->
        <div class="empty-state">
          <p>点击左侧新闻查看板块影响</p>
        </div>
      </div>
    </div>

    <!-- 右栏：优质股机会池 -->
    <div class="panel right-panel" id="opportunityPanel">
      <div class="panel-header">
        <div class="panel-title">
          <span class="icon">🎯</span>
          优质股机会池
        </div>
        <div class="panel-actions">
          <button class="btn-icon" title="刷新" onclick="refreshOpportunities()">🔄</button>
          <button class="btn-icon" title="配置" onclick="openConfig()">⚙️</button>
        </div>
      </div>
      <div class="opportunity-list" id="opportunityList">
        <!-- 机会卡由 JS 动态渲染 -->
        <div class="empty-state">
          <p>选择板块查看股票机会</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部时间轴 -->
  <div class="timeline-bar" id="timelineBar">
    <div class="timeline-controls">
      <button class="btn-timeline" id="playPauseBtn" title="播放/暂停">▶</button>
      <button class="btn-timeline" id="liveModeBtn" title="实时模式">LIVE</button>
    </div>
    <div class="timeline-track" id="timelineTrack">
      <div class="timeline-progress" id="timelineProgress"></div>
    </div>
    <div class="timeline-time" id="timelineTime">--:--:--</div>
  </div>

  <!-- 配置弹窗 -->
  <div class="modal" id="configModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>配置中心</h2>
        <button class="btn-close" onclick="closeConfig()">×</button>
      </div>
      <div class="modal-body">
        <div class="config-tabs">
          <button class="tab active" data-tab="sector">板块映射</button>
          <button class="tab" data-tab="stock">优质股票池</button>
          <button class="tab" data-tab="monitor">健康监控</button>
        </div>
        <div class="config-content" id="configContent">
          <!-- 配置内容由 JS 动态渲染 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 风险确认弹窗 -->
  <div class="modal" id="riskModal">
    <div class="modal-content modal-small">
      <div class="modal-header">
        <h2>⚠️ 风险确认</h2>
        <button class="btn-close" onclick="closeRiskModal()">×</button>
      </div>
      <div class="modal-body" id="riskModalBody">
        <!-- 风险详情 -->
      </div>
    </div>
  </div>

  <script src="./runtime-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
