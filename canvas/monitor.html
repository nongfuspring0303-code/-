<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDT 健康监控</title>
  <style>
    body {
      margin: 0;
      font-family: "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0e1422;
      color: #dce6ff;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .meta { color: #8fa3cc; margin-bottom: 18px; font-size: 13px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .card {
      background: #17203a;
      border: 1px solid #2a3658;
      border-radius: 12px;
      padding: 16px;
    }
    .module { font-size: 12px; color: #9db1da; }
    .score { font-size: 36px; font-weight: 700; margin: 8px 0; }
    .healthy { color: #2bb673; }
    .warning { color: #f2a43b; }
    .critical { color: #e25555; }
    .kpis { font-size: 12px; color: #9db1da; line-height: 1.7; }
    .panel {
      margin-top: 14px;
      background: #17203a;
      border: 1px solid #2a3658;
      border-radius: 12px;
      padding: 12px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { text-align: left; border-bottom: 1px solid #2a3658; padding: 8px; }
    th { color: #8fa3cc; font-weight: 500; }
    .right { text-align: right; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    button {
      border: 1px solid #2a3658;
      background: #22345f;
      color: #dce6ff;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">系统健康监控面板</div>
    <div class="meta" id="meta">窗口: 最近 30 分钟 · 自动刷新 5 秒</div>

    <div class="toolbar">
      <div>模块超时/降级信号总览</div>
      <button onclick="refreshNow()">立即刷新</button>
    </div>

    <div class="grid" id="moduleGrid"></div>

    <div class="panel">
      <div style="margin-bottom:8px;color:#9db1da;">最近信号</div>
      <table>
        <thead>
          <tr>
            <th>时间</th>
            <th>模块</th>
            <th>类型</th>
            <th>级别</th>
            <th>trace_id</th>
            <th class="right">说明</th>
          </tr>
        </thead>
        <tbody id="signalTable"></tbody>
      </table>
    </div>
  </div>

  <script src="./runtime-config.js"></script>
  <script>
    const API_BASE = window.RUNTIME_CONFIG?.API_BASE || 'http://127.0.0.1:18787';

    function levelClass(level) {
      if (level === 'healthy') return 'healthy';
      if (level === 'warning') return 'warning';
      return 'critical';
    }

    function render(data) {
      const grid = document.getElementById('moduleGrid');
      const modules = data.modules || {};
      grid.innerHTML = ['A','B','C'].map(m => {
        const item = modules[m] || { score: 100, level: 'healthy', event_count: 0, timeouts: 0, degrades: 0 };
        return `
          <div class="card">
            <div class="module">模块 ${m}</div>
            <div class="score ${levelClass(item.level)}">${item.score}</div>
            <div class="kpis">
              level: ${item.level}<br>
              events: ${item.event_count}<br>
              timeout: ${item.timeouts}<br>
              degrade: ${item.degrades}
            </div>
          </div>
        `;
      }).join('');

      const tbody = document.getElementById('signalTable');
      const rows = (data.recent_signals || []).slice().reverse();
      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${r.ts || '-'}</td>
          <td>${r.module || '-'}</td>
          <td>${r.signal_type || '-'}</td>
          <td>${r.severity || '-'}</td>
          <td>${r.trace_id || '-'}</td>
          <td class="right">${r.message || '-'}</td>
        </tr>
      `).join('');

      document.getElementById('meta').textContent = `窗口: 最近 ${data.window_minutes || 30} 分钟 · 生成时间: ${data.generated_at || '-'}`;
    }

    async function fetchStatus() {
      try {
        const res = await fetch(`${API_BASE}/api/monitor/status`);
        if (!res.ok) return;
        const data = await res.json();
        render(data);
      } catch (_) {
      }
    }

    function refreshNow() { fetchStatus(); }

    fetchStatus();
    setInterval(fetchStatus, 5000);
  </script>
</body>
</html>
