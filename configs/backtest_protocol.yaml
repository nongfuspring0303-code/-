version: v1
pit_snapshot:
  require_feature_snapshot: true
  require_rule_snapshot_version: true
  require_universe_snapshot: true
  require_asset_whitelist_snapshot: true

leakage_rules:
  max_feature_time_relation: "<=t_decide"
  disallow_post_decide_market_data: true

robustness:
  threshold_perturbation: [0.10, 0.20]
  weight_perturbation: [0.10, 0.20]
  require_direction_consistency: true
