# EDT v2.2 feature flags (single source for rollout controls)
# Owner: Member A

flags:
  enable_contract_v22_dual_write:
    default: false
    owner: member_a
    rollback_owner: member_a
    description: Enable dual-write compatibility for contract v2.2 outputs.

  enable_output_gate_v2:
    default: false
    owner: member_a
    rollback_owner: member_a
    description: Enable unified output gate v2 logic.

  enable_sector_whitelist_v2:
    default: false
    owner: member_b
    rollback_owner: member_b
    description: Enforce sector whitelist filtering in v2 path.

  enable_theme_tags_routing_v2:
    default: false
    owner: member_b
    rollback_owner: member_b
    description: Enable theme tags routing influence.

  enable_ticker_pool_v2:
    default: false
    owner: member_b
    rollback_owner: member_b
    description: Enforce ticker pool routing and validation.

  enable_replay_join_validation_v2:
    default: false
    owner: member_c
    rollback_owner: member_c
    description: Enable replay join key validation rules.

  enable_priority_queue_v2:
    default: false
    owner: member_c
    rollback_owner: member_c
    description: Enable freshness-priority queue scheduling.

  enable_parallel_price_fetch_v2:
    default: false
    owner: member_c
    rollback_owner: member_c
    description: Enable parallel price fetch path.

  # ── Stage 8-A v5 shadow boundary ──
  enable_v5_shadow_output:
    default: true
    owner: member_c
    rollback_owner: member_c
    description: Enable Stage8A v5 shadow output namespace without replacing legacy production output.

  enable_replace_legacy_output:
    default: false
    owner: member_c
    rollback_owner: member_c
    description: Replace legacy production output with v5 output. Must remain false until compatibility exit conditions are met.

  enable_conduction_split:
    default: false
    owner: member_a
    rollback_owner: member_a
    description: Enable conduction_candidate_generation / conduction_final_selection split.

  enable_semantic_prepass:
    default: false
    owner: member_a
    rollback_owner: member_a
    description: Enable semantic_prepass stage before candidate generation.

  enable_source_metadata_propagation:
    default: false
    owner: member_b
    rollback_owner: member_b
    description: Enable source / role / relation / event_id propagation across candidate production and downstream review surfaces.

  enable_candidate_envelope:
    default: false
    owner: member_b
    rollback_owner: member_b
    description: Enable CandidateEnvelope compatibility surface for stable candidate identity, provenance, and routing context.
