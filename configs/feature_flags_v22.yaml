# EDT v2.2 feature flags (single source for rollout controls)
# Owner: Member A

flags:
  enable_contract_v22_dual_write:
    default: false
    owner: member_a
    rollback_owner: member_a
    description: Enable dual-write compatibility for contract v2.2 outputs.

  enable_output_gate_v2:
    default: false
    owner: member_a
    rollback_owner: member_a
    description: Enable unified output gate v2 logic.

  enable_sector_whitelist_v2:
    default: false
    owner: member_b
    rollback_owner: member_b
    description: Enforce sector whitelist filtering in v2 path.

  enable_theme_tags_routing_v2:
    default: false
    owner: member_b
    rollback_owner: member_b
    description: Enable theme tags routing influence.

  enable_ticker_pool_v2:
    default: false
    owner: member_b
    rollback_owner: member_b
    description: Enforce ticker pool routing and validation.

  enable_replay_join_validation_v2:
    default: false
    owner: member_c
    rollback_owner: member_c
    description: Enable replay join key validation rules.

  enable_priority_queue_v2:
    default: false
    owner: member_c
    rollback_owner: member_c
    description: Enable freshness-priority queue scheduling.

  enable_parallel_price_fetch_v2:
    default: false
    owner: member_c
    rollback_owner: member_c
    description: Enable parallel price fetch path.
