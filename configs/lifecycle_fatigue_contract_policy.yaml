schema_version: stage6.lifecycle_fatigue_policy.v1
version: "1.0.0"

lifecycle:
  allowed_lifecycle_state:
    - Detected
    - Verified
    - Active
    - Continuation
    - Exhaustion
    - Dead
    - Archived
  allowed_time_scale:
    - intraday
    - overnight
    - multiweek
    - none
  allowed_decay_profile:
    - fast
    - medium
    - slow
    - exhausted
    - none

fatigue:
  allowed_fatigue_bucket:
    - none
    - low
    - medium
    - high
    - critical
  score_range:
    min: 0
    max: 100
