$schema: http://json-schema.org/draft-07/schema#
title: Event Update Schema
description: EDT新闻事件输入格式 - 从新闻源输入
type: object
required:
  - type
  - trace_id
  - schema_version
  - headline
  - source
  - timestamp
properties:
  type:
    type: string
    const: event_update
    description: 消息类型标识
  trace_id:
    type: string
    minLength: 8
    anyOf:
      - pattern: "^TRC-[A-Za-z0-9_-]+$"
      - pattern: "^REQ-[A-Za-z0-9_-]+$"
      - pattern: "^BATCH-[A-Za-z0-9_-]+$"
      - pattern: "^evt_[A-Za-z0-9_-]+$"
    description: 事件追踪ID，由统一仲裁与事件总线贯穿生成
  schema_version:
    type: string
    const: v1.0
    description: Schema版本号
  request_id:
    type: string
    minLength: 1
    description: 请求级幂等ID
  batch_id:
    type: string
    minLength: 1
    description: 批次级追踪ID
  headline:
    type: string
    description: 新闻标题
  source:
    type: string
    description: 新闻来源
  source_url:
    type: string
    format: uri
    description: 原始来源链接
  severity:
    type: string
    enum: [E0, E1, E2, E3, E4]
    description: 严重度等级
  timestamp:
    type: string
    format: date-time
    description: 事件时间
  detected_at:
    type: string
    format: date-time
    description: 系统检测时间
  ai_verdict:
    type: string
    description: AI语义分析判定 (hit/abstain/not_called)
  ai_confidence:
    type: number
    description: AI语义分析置信度
  ai_reason:
    type: string
    description: AI语义分析理由
