$schema: http://json-schema.org/draft-07/schema#
title: Sector Update Schema
description: A模块输出 - 板块影响更新事件
type: object
required:
  - type
  - trace_id
  - schema_version
  - sectors
  - timestamp
properties:
  type:
    type: string
    const: sector_update
    description: 消息类型标识
  trace_id:
    type: string
    pattern: "^evt_[a-zA-Z0-9]{16}$"
    description: 事件追踪ID，贯穿全链路
  schema_version:
    type: string
    const: v1.0
    description: Schema版本号
  sectors:
    type: array
    description: 受影响板块列表
    items:
      type: object
      required:
        - name
        - direction
        - impact_score
      properties:
        name:
          type: string
          description: 板块名称
        direction:
          type: string
          enum: [LONG, SHORT, WATCH]
          description: 影响方向
        impact_score:
          type: number
          minimum: 0
          maximum: 1
          description: 影响强度 0-1
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: 置信度 0-1
  conduction_chain:
    type: array
    description: 传导链层级
    items:
      type: object
      required:
        - level
        - name
      properties:
        level:
          type: string
          enum: [macro, sector, theme]
          description: 层级
        name:
          type: string
          description: 名称
        relation:
          type: string
          enum: [affects_above, same, affects_below]
          description: 传导关系
  timestamp:
    type: string
    format: date-time
    description: 事件时间
  source_event_id:
    type: string
    description: 关联的原始新闻ID
