version: v1.0
owner: member_a
description: Theme engine E2E acceptance samples (Contract Owner)

samples:
  - case_id: E2E-01
    name: 正常主题催化样本
    sample_id: theme_nvda_quantum_official_t0
    input_profile: official_news_theme_hit
    expected_assertions:
      - route_to_theme_engine=true
      - primary_theme_non_empty
      - basket_confirmation_valid
      - current_state_computable
      - trade_grade_non_empty
      - downstream_contract_fields_complete
    pass_threshold: 100%_critical_assertions_pass
    on_fail_action: block_merge

  - case_id: E2E-02
    name: 主题映射失败样本
    sample_id: theme_mapping_fail_generic_news
    input_profile: weak_or_unknown_theme_news
    expected_assertions:
      - fallback_reason=THEME_MAPPING_FAILED
      - safe_to_consume=false
      - trade_grade_not_in=[A,B]
    pass_threshold: 100%_critical_assertions_pass
    on_fail_action: block_merge

  - case_id: E2E-03
    name: 篮子为空样本
    sample_id: theme_basket_empty_case
    input_profile: mapped_theme_without_effective_basket
    expected_assertions:
      - error_code=BASKET_EMPTY
      - trade_grade_not_in=[A,B]
      - candidate_audit_pool_empty
    pass_threshold: 100%_critical_assertions_pass
    on_fail_action: block_merge

  - case_id: E2E-04
    name: 主副链冲突样本
    sample_id: macro_risk_off_theme_hit_conflict
    input_profile: macro_risk_off_theme_positive
    expected_assertions:
      - conflict_flag=true
      - final_decision_source=mainchain_capped_theme
      - trade_grade_capped_to=C_or_below
    pass_threshold: 100%_critical_assertions_pass
    on_fail_action: block_merge

  - case_id: E2E-05
    name: 主链缺失降级样本
    sample_id: mainchain_missing_theme_only_degraded
    input_profile: theme_only_without_macro_context
    expected_assertions:
      - final_decision_source=theme_only_degraded
      - fallback_reason=MAINCHAIN_MISSING
      - safe_to_consume=false
      - theme_capped_by_macro=true
    pass_threshold: 100%_critical_assertions_pass
    on_fail_action: block_merge

  - case_id: E2E-06
    name: replay一致性样本
    sample_id: replay_same_snapshot_same_config
    input_profile: same_event_same_config_same_window
    expected_assertions:
      - replay_consistency=true
      - idempotency_key_stable
      - if_inconsistent_then_consistency_break_reason_present
    pass_threshold: replay_consistency_rate>=99%
    on_fail_action: freeze_release_and_open_incident
