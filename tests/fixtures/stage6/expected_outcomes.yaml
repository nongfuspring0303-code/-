failure_reason_enum:
  - mapping_wrong
  - timing_wrong
  - market_rejected
  - source_bad
  - risk_too_strict
  - risk_too_loose
  - provider_bad
  - market_data_bad
  - score_not_predictive
  - gate_rule_wrong
  - execution_missing
  - join_key_missing
  - benchmark_missing
  - insufficient_sample

primary_stats_rules:
  valid: "included"
  degraded: "excluded"
  invalid: "excluded"
  pending: "excluded"
  pending_confirm: "excluded"
  unknown: "excluded"
  mock_test: "excluded"
  benchmark_missing: "excluded_from_alpha_primary"
